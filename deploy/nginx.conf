# UBInsights PMT — Nginx reverse proxy config
# YOUR_DOMAIN is replaced by deploy.sh with the actual domain

# Redirect HTTP → HTTPS (Certbot will modify this block)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 25M;

    # Before SSL is set up, proxy directly; after Certbot, this becomes a redirect
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS server — Certbot will create this block automatically when you run:
#   sudo certbot --nginx -d YOUR_DOMAIN
#
# It will:
#   1. Add a server block listening on 443 with SSL
#   2. Add ssl_certificate and ssl_certificate_key directives
#   3. Modify the port 80 block above to redirect to HTTPS
#
# The proxy_pass and header settings will be copied from the HTTP block.

# --- Static asset caching (applied in both HTTP and HTTPS contexts) ---
# Next.js hashed static assets — cache aggressively
# This works inside the location blocks above; Certbot preserves custom locations.
# If you want to add it manually to the HTTPS block after Certbot runs:
#
#   location /_next/static/ {
#       proxy_pass http://127.0.0.1:3000;
#       expires 365d;
#       add_header Cache-Control "public, immutable";
#   }
#
#   # Upload size limit (for file attachments)
#   client_max_body_size 25M;
