services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ubinsights
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ubinsights_pmt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubinsights -d ubinsights_pmt"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Low memory tuning for small VM
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=20

  # One-time migration runner
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://ubinsights:${DB_PASSWORD:-changeme}@db:5432/ubinsights_pmt
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://ubinsights:${DB_PASSWORD:-changeme}@db:5432/ubinsights_pmt
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: https://pm.ubinsights.com
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  uploads:
